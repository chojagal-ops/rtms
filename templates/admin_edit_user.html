{% extends 'base.html' %}
{% block title %}회원 수정 — RTMS{% endblock %}
{% block topbar_title %}👥 회원 정보 수정{% endblock %}

{% block content %}
<div class="breadcrumb">
  <a href="{{ url_for('auth.admin_users') }}">회원 관리</a>
  <span>›</span><span>{{ u.name }} 수정</span>
</div>

<div style="max-width:520px;margin:0 auto;">
  <form method="POST">

    <div class="card" style="margin-bottom:16px;">
      <div class="card-header"><h5>📝 기본 정보</h5></div>
      <div class="card-body">
        <div class="form-group" style="margin-bottom:14px;">
          <label class="form-label">아이디</label>
          <input type="text" class="form-control" value="{{ u.username }}"
                 disabled style="background:#f8f9fa;color:#6b7280;">
        </div>
        <div class="form-group" style="margin-bottom:14px;">
          <label class="form-label">이름 <span class="req">*</span></label>
          <input type="text" name="name" class="form-control"
                 value="{{ u.name }}" required>
        </div>
        <div class="form-group" style="margin-bottom:14px;">
          <label class="form-label">이메일</label>
          <input type="email" name="email" class="form-control"
                 value="{{ u.email or '' }}" placeholder="example@company.com">
        </div>
        <div class="form-group" style="margin-bottom:14px;">
          <label class="form-label">부서</label>
          <input type="text" name="department" class="form-control"
                 value="{{ u.department or '' }}">
        </div>
        <div class="form-grid cols-2" style="margin-bottom:0;">
          <div class="form-group">
            <label class="form-label">권한</label>
            <select name="role" class="form-control">
              <option value="user"  {{ 'selected' if u.role == 'user' }}>일반</option>
              <option value="admin" {{ 'selected' if u.role == 'admin' }}>관리자</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">승인 상태</label>
            <div style="display:flex;align-items:center;gap:10px;height:40px;">
              <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
                <input type="checkbox" name="is_approved"
                       {{ 'checked' if u.is_approved }} style="width:16px;height:16px;">
                승인됨
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:20px;">
      <div class="card-header">
        <h5>🔒 비밀번호 초기화 <span style="font-size:11px;font-weight:400;color:#9ca3af;">(입력 시에만 변경)</span></h5>
      </div>
      <div class="card-body">
        <div class="form-group" style="margin-bottom:0;">
          <label class="form-label">새 비밀번호</label>
          <input type="password" name="new_password" class="form-control"
                 placeholder="변경할 비밀번호 (6자 이상)" minlength="6">
          <div style="font-size:11px;color:#9ca3af;margin-top:4px;">
            비워두면 기존 비밀번호가 유지됩니다.
          </div>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <a href="{{ url_for('auth.admin_users') }}" class="btn btn-outline">취소</a>
      <button type="submit" class="btn btn-primary">💾 저장</button>
    </div>
  </form>
</div>
{% endblock %}
