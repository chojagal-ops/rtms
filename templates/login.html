<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — RTMS</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
<div class="login-box">
  <div class="login-logo">
    <!-- 아이콘: 흰색 플라스크 + INTOPS -->
    <div style="width:80px;height:80px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;margin:0 auto 18px;box-shadow:0 6px 22px rgba(249,115,22,0.38);">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 3h6v6l4.5 9A2 2 0 0 1 17.8 21H6.2a2 2 0 0 1-1.7-3L9 9V3z"/>
        <line x1="9" y1="3" x2="15" y2="3"/>
        <line x1="7.5" y1="11" x2="16.5" y2="11"/>
      </svg>
      <span style="font-size:9px;font-weight:900;color:white;letter-spacing:0.15em;line-height:1;">INTOPS</span>
    </div>
    <div class="logo-title">신뢰성 시험 관리 시스템</div>
    <div class="logo-sub">Reliability Test Management System (RTMS)</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <div class="form-group" style="margin-bottom:14px;">
      <label class="form-label">아이디</label>
      <input type="text" name="username" class="form-control" placeholder="아이디 입력" required autofocus>
    </div>
    <div class="form-group" style="margin-bottom:18px;">
      <label class="form-label">비밀번호</label>
      <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
    </div>
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-sub);margin-bottom:18px;cursor:pointer;">
      <input type="checkbox" name="remember"> 로그인 유지
    </label>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">로그인</button>
  </form>
  <div style="text-align:center;margin-top:18px;font-size:12px;color:var(--text-muted);">
    계정이 없으신가요?
    <a href="{{ url_for('auth.register') }}" style="color:var(--primary);text-decoration:none;font-weight:600;">회원가입 신청</a>
  </div>
</div>
</body>
</html>
