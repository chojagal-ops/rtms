<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — RTMS</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: url("{{ url_for('static', filename='img/login_bg.jpg') }}") center/cover no-repeat fixed;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding-left: 7vw;
  position: relative;
  font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
}

/* 반투명 오버레이 — 왼쪽 진하게, 오른쪽 투명 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(8, 18, 35, 0.60) 0%,
    rgba(8, 18, 35, 0.30) 45%,
    rgba(8, 18, 35, 0.05) 100%
  );
  z-index: 0;
}

/* 로그인 카드 */
.login-wrap {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 400px;
  padding: 16px;
}
.login-box {
  background: rgba(255, 255, 255, 0.96);
  border-radius: 20px;
  padding: 40px 36px 32px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.35), 0 4px 16px rgba(0,0,0,0.15);
  backdrop-filter: blur(4px);
}
.login-logo { text-align: center; margin-bottom: 28px; }
.logo-icon {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, #f97316, #ea580c);
  border-radius: 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  margin: 0 auto 18px;
  box-shadow: 0 6px 22px rgba(249,115,22,0.38);
}
.logo-title { font-size: 20px; font-weight: 800; color: #1e293b; margin-bottom: 4px; }
.logo-sub   { font-size: 11px; color: #94a3b8; letter-spacing: 0.03em; }
.form-label { display: block; font-size: 12px; font-weight: 700; color: #475569; margin-bottom: 6px; }
.form-control {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid #e2e8f0; border-radius: 10px;
  font-size: 14px; color: #1e293b; outline: none;
  transition: border-color .2s;
}
.form-control:focus { border-color: #f97316; }
.form-group { margin-bottom: 14px; }
.btn-login {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #f97316, #ea580c);
  color: #fff; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 14px rgba(249,115,22,0.4);
  transition: opacity .2s;
}
.btn-login:hover { opacity: .9; }
.alert {
  padding: 10px 14px; border-radius: 8px;
  font-size: 13px; margin-bottom: 16px;
  background: #fee2e2; color: #991b1b;
  border: 1px solid #fca5a5;
}

/* 좌측 하단 시스템명 레이블 */
.bg-label {
  position: fixed;
  left: 48px;
  bottom: 36px;
  z-index: 5;
  color: rgba(255,255,255,0.75);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.bg-label .title {
  font-size: 20px;
  font-weight: 800;
  color: #fff;
  display: block;
  margin-bottom: 4px;
  letter-spacing: 0.04em;
}

@media (max-width: 640px) {
  body { justify-content: center; padding-right: 0; }
  .bg-label { display: none; }
}
</style>
</head>
<body>

<!-- 좌측 하단 브랜드 레이블 -->
<div class="bg-label">
  <span class="title">INTOPS RTMS</span>
  신뢰성 시험 관리 시스템
</div>

<!-- ══ 로그인 카드 ══ -->
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 3h6v6l4.5 9A2 2 0 0 1 17.8 21H6.2a2 2 0 0 1-1.7-3L9 9V3z"/>
          <line x1="9" y1="3" x2="15" y2="3"/>
          <line x1="7.5" y1="11" x2="16.5" y2="11"/>
        </svg>
        <span style="font-size:9px;font-weight:900;color:white;letter-spacing:.15em;line-height:1;">INTOPS</span>
      </div>
      <div class="logo-title">신뢰성 시험 관리 시스템</div>
      <div class="logo-sub">Reliability Test Management System (RTMS)</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label">아이디</label>
        <input type="text" name="username" class="form-control" placeholder="아이디 입력" required autofocus>
      </div>
      <div class="form-group" style="margin-bottom:18px;">
        <label class="form-label">비밀번호</label>
        <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
      </div>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#64748b;margin-bottom:18px;cursor:pointer;">
        <input type="checkbox" name="remember"> 로그인 유지
      </label>
      <button type="submit" class="btn-login">로그인</button>
    </form>

    <div style="text-align:center;margin-top:14px;font-size:12px;color:#94a3b8;">
      <a href="{{ url_for('auth.forgot_password') }}"
         style="color:#6b7280;text-decoration:none;font-weight:600;">🔑 비밀번호 찾기</a>
    </div>
    <div style="text-align:center;margin-top:10px;font-size:12px;color:#94a3b8;">
      계정이 없으신가요?
      <a href="{{ url_for('auth.register') }}" style="color:#f97316;text-decoration:none;font-weight:600;">회원가입 신청</a>
    </div>
  </div>
</div>

</body>
</html>
