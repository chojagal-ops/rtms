<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 찾기 — RTMS</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
<div class="login-box" style="width:420px;">
  <div class="login-logo">
    <div style="width:80px;height:80px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;margin:0 auto 18px;box-shadow:0 6px 22px rgba(249,115,22,0.38);">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 3h6v6l4.5 9A2 2 0 0 1 17.8 21H6.2a2 2 0 0 1-1.7-3L9 9V3z"/>
        <line x1="9" y1="3" x2="15" y2="3"/>
        <line x1="7.5" y1="11" x2="16.5" y2="11"/>
      </svg>
      <span style="font-size:9px;font-weight:900;color:white;letter-spacing:0.15em;line-height:1;">INTOPS</span>
    </div>
    <div class="logo-title">비밀번호 찾기</div>
    <div class="logo-sub">가입 시 등록한 이메일로 임시 비밀번호를 발송합니다</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <!-- 안내 박스 -->
  <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#92400e;line-height:1.6;">
    🔑 아이디와 가입 시 등록한 이메일 주소를 입력하면<br>
    임시 비밀번호를 해당 이메일로 발송해 드립니다.
  </div>

  <form method="POST">
    <div class="form-group" style="margin-bottom:14px;">
      <label class="form-label">아이디 <span class="req">*</span></label>
      <input type="text" name="username" class="form-control"
             placeholder="가입한 아이디 입력" required autofocus>
    </div>
    <div class="form-group" style="margin-bottom:22px;">
      <label class="form-label">이메일 주소 <span class="req">*</span></label>
      <input type="email" name="email" class="form-control"
             placeholder="가입 시 등록한 이메일" required>
    </div>
    <button type="submit" class="btn btn-primary"
            style="width:100%;justify-content:center;padding:12px;">
      📨 임시 비밀번호 발송
    </button>
  </form>

  <div style="text-align:center;margin-top:18px;font-size:12px;color:var(--text-muted);display:flex;justify-content:center;gap:20px;">
    <a href="{{ url_for('auth.login') }}"
       style="color:var(--primary);text-decoration:none;font-weight:600;">← 로그인</a>
    <a href="{{ url_for('auth.register') }}"
       style="color:#6b7280;text-decoration:none;font-weight:600;">회원가입 →</a>
  </div>
</div>
</body>
</html>
