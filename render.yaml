services:
  - type: web
    name: rtms
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: rtms-db
          property: connectionString
      - key: FLASK_PORT
        value: "10000"

databases:
  - name: rtms-db
    databaseName: rtms
    plan: free
